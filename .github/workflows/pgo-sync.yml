name: PGO Sync

# Daily refresh of the PGO dashboard cache: queries BigQuery (Buildium export)
# and upserts the pgo_* Supabase tables that app/pgo reads. Runs in the cloud so
# the dashboard stays fresh regardless of whether Collin's Mac is on.
#
# Schedule is UTC (GitHub cron has no DST). 12:00 UTC = 7am CDT / 6am CST.

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}

concurrency:
  group: pgo-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Write BigQuery service-account key
        run: printf '%s' "$PGO_BQ_SA_JSON" > "$RUNNER_TEMP/pgo-sa.json"
        env:
          PGO_BQ_SA_JSON: ${{ secrets.PGO_BQ_SA_JSON }}
      - name: Run sync
        run: node scripts/pgo-sync.mjs
        env:
          PGO_BQ_KEY_PATH: ${{ runner.temp }}/pgo-sa.json
          PGO_BQ_BILLING_PROJECT: ${{ secrets.PGO_BQ_BILLING_PROJECT }}
          PGO_BQ_DATASET: ${{ secrets.PGO_BQ_DATASET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
