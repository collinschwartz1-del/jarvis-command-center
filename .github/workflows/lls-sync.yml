name: LLS Sync

# Hourly refresh of the /lending dashboard cache: pulls Liquid Lending Solutions
# data from Lendr (+ classifies borrower mail via Gmail/Claude) and upserts the
# Supabase tables app/lending reads. Runs in the cloud so the dashboard stays
# fresh regardless of whether Collin's Mac is on. Read-only — never sends/moves money.
#
# Replaces the local hourly cron (jarvis-command-center/scripts/lls-cron.sh sync).
# Schedule is UTC (GitHub cron has no DST). "0 * * * *" = top of every hour.

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

concurrency:
  group: lls-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Run LLS sync
        run: node scripts/lls-sync.mjs
        env:
          LENDR_API_BASE: ${{ secrets.LENDR_API_BASE }}
          LENDR_API_KEY: ${{ secrets.LENDR_API_KEY }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
